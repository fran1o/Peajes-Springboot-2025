<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emular Tránsito - Administrador</title>
    <script src="vistaWeb.js"></script>
    <link rel="stylesheet" href="emularTransito.css">
</head>
<body>
    <script src="utilesVista.js"></script>
    <h1>Emular Tránsito</h1>
    <p>Seleccione un puesto, verifique sus tarifas, ingrese una matrícula y emule un tránsito.</p>

    <main class="container">
        <form id="formEmular" action="/admin/emular/emularTransito" method="post">
            <section>
                <h3>Puesto</h3>
                <select id="selectPuesto" name="puestoNombre">
                    <option value="">Seleccione un puesto</option>
                </select>

                <h3>Tarifas del puesto</h3>
                <table id="tablaTarifas"></table>

                <h3>Matrícula</h3>
                <input id="matricula" name="matricula" type="text" placeholder="Ej: ABC1234" required />

                <h3>Fecha y hora del tránsito</h3>
                <input id="fechaHora" name="fechaHora" type="datetime-local" required />

                <button type="submit">Emular Tránsito</button>
            </section>
        </form>

        <section id="resultadoSection" style="display: none;">
            <h2>Resultado del Tránsito</h2>
            <p><strong>Propietario:</strong> <span id="propietarioNombre"></span></p>
            <p><strong>Estado:</strong> <span id="estado"></span></p>
            <p><strong>Categoría:</strong> <span id="categoria"></span></p>
            <p><strong>Bonificación:</strong> <span id="bonificacion"></span></p>
            <p><strong>Costo:</strong> $<span id="costo"></span></p>
            <p><strong>Saldo:</strong> $<span id="saldo"></span></p>
        </section>
    </main>

    <p id="message" class="message" aria-live="polite"></p>
</body>

<script>
    var urlIniciarVista = "/admin/emular/cargarPuestos";
    
    const selectPuesto = document.getElementById('selectPuesto');
    const tablaTarifas = document.getElementById('tablaTarifas');
    const formEmular = document.getElementById('formEmular');
    const resultadoSection = document.getElementById('resultadoSection');

    async function excepcionDeAplicacion(mensaje){
            await mostrarMensaje(mensaje);
            resultadoSection.style.display = 'none';
    }

    function mostrar_puestos(puestos) {
        selectPuesto.innerHTML = '<option value="">Seleccione un puesto</option>';
        puestos.forEach(puesto => {
            const option = document.createElement('option');
            option.value = puesto.nombre;
            option.textContent = puesto.nombre + ' - ' + puesto.direccion;
            selectPuesto.appendChild(option);
        });
    }

    selectPuesto.addEventListener('change', function() {
        const puestoNombre = this.value;
        if (puestoNombre) {
            submit("/admin/emular/cargarTarifas", "puestoNombre=" + encodeURIComponent(puestoNombre));
        } else {
            tablaTarifas.innerHTML = 'No hay tarifas para el puesto seleccionado';
        }
    });

    function mostrar_tarifas(tarifas) {
        tablaTarifas.innerHTML=crearTablaDesdeJson(tarifas);
    }

    formEmular.addEventListener('submit', function(e) {
            e.preventDefault();
            submit("/admin/emular/emularTransito",serializarFormulario('formEmular'));
          
        });

    function mostrar_propietarioNombre(nombre) {
        document.getElementById('propietarioNombre').textContent = nombre;
        resultadoSection.style.display = 'block';
    }

    function mostrar_estado(estado) {
        document.getElementById('estado').textContent = estado;
    }

    function mostrar_categoria(categoria) {
        document.getElementById('categoria').textContent = categoria;
    }

    function mostrar_bonificacion(bonificacion) {
        document.getElementById('bonificacion').textContent = bonificacion || 'Ninguna';
    }

    function mostrar_costo(costo) {
        document.getElementById('costo').textContent = costo.toFixed(2);
    }

    function mostrar_saldo(saldo) {
        document.getElementById('saldo').textContent = saldo.toFixed(2);
    }


</script>
</html>
