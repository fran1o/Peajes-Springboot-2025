<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Asignar Bonificaciones - Administrador</title>
    <link rel="stylesheet" href="base.css" />
    <script src="vistaWeb.js"></script>
</head>
<body>
    <script src="utilesVista.js"></script>
    <main class="container">
        <h1>Asignar Bonificaciones</h1>

        <section>
            
            <h3>Bonificaciones definidas</h3>
            <select id="selectBonificacion" name="bonificacionNombre">
                <option value="">Seleccione una bonificación</option>
            </select>

            <h3>Puestos definidos</h3>
            <select id="selectPuesto" name="puestoNombre">
                    <option value="">Seleccione un puesto</option>
            </select>

            <button id="btnAsignar">Asignar bonificacion</button>
        </section>

        <section>
            <h2>Buscar Propietario</h2>
            <label for="cedula">Cédula:</label>
            <input id="cedula" type="text" placeholder="Ingrese cédula del propietario" />
            <button id="btnBuscar">Buscar</button>
        </section>

        <section id="propietarioSection" style="display: none;">
            <h2>Información del Propietario</h2>
            <p><strong>Nombre:</strong> <span id="nombreCompleto"></span></p>
            <p><strong>Estado:</strong> <span id="estado"></span></p>

            <h3>Bonificaciones Asignadas</h3>
            <div id="tablaBonificacionesAsignadas"></div>
        </section>

        
    </main>
</body>

<script>
    var urlIniciarVista = "/admin/cargarBonificacionesYPuestos";

    const btnAsignar = document.getElementById('btnAsignar');
    const btnBuscar = document.getElementById('btnBuscar');
    const selectBonificacion = document.getElementById('selectBonificacion');
    const selectPuesto = document.getElementById('selectPuesto');
    const propietarioSection = document.getElementById('propietarioSection');
    
    let cedulaActual = '';

    function mostrar_bonificaciones(bonificaciones) {
        selectBonificacion.innerHTML = '<option value="">Seleccione una bonificación</option>';
        bonificaciones.forEach(bonif => {
            const option = document.createElement('option');
            option.value = bonif.nombre;
            option.textContent = bonif.nombre;
            selectBonificacion.appendChild(option);
        });
    }

    function mostrar_puestos(puestos) {
        selectPuesto.innerHTML = '<option value="">Seleccione un puesto</option>';
        puestos.forEach(puesto => {
            const option = document.createElement('option');
            option.value = puesto.nombre;
            option.textContent = puesto.nombre + ' - ' + puesto.direccion;
            selectPuesto.appendChild(option);
        });
    }

    btnAsignar.addEventListener('click', function() {
        const bonificacionNombre = selectBonificacion.value;
        const puestoNombre = selectPuesto.value;

        const params = "cedula=" + encodeURIComponent(cedulaActual) + 
                      "&bonificacionNombre=" + encodeURIComponent(bonificacionNombre) + 
                      "&puestoNombre=" + encodeURIComponent(puestoNombre);
        
        submit("/admin/asignarBonificacion", params);
    });

    btnBuscar.addEventListener('click', function() {
        cedulaActual = document.getElementById('cedula').value;
        submit("/admin/buscarPropietario", "cedula=" + encodeURIComponent(cedulaActual));
    });

    function mostrar_nombreCompleto(nombre) {
        document.getElementById('nombreCompleto').textContent = nombre;
        propietarioSection.style.display = 'block';
    }

    function mostrar_estado(estado) {
        document.getElementById('estado').textContent = estado;
    }

    function mostrar_bonificacionesDeProp(bonificacionesDeProp) {
        const tablaBonificacionesAsignadas = document.getElementById('tablaBonificacionesAsignadas');
        if (bonificacionesDeProp.length === 0) {
            tablaBonificacionesAsignadas.innerHTML = '<p>No tiene bonificaciones asignadas</p>';
            return;
        }
        tablaBonificacionesAsignadas.innerHTML = crearTablaDesdeJson(bonificacionesDeProp);
    }


    function mostrar_resultado(mensaje) {
        alert(mensaje);
        selectBonificacion.value = '';
        selectPuesto.value = '';
        submit("/admin/buscarPropietario", "cedula=" + encodeURIComponent(cedulaActual));
    }

    async function excepcionDeAplicacion(mensaje) {
        await mostrarMensaje(mensaje);
        if (mensaje === "no existe el propietario") {
            propietarioSection.style.display = 'none';
            asignarSection.style.display = 'none';
        }
    }
</script>

</html>
